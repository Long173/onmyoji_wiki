name: onmyoji_wiki
description: "Wiki tiếng Việt cho game Onmyoji — Thức Thần, Ngự hồn, danh sách yêu thích."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  flutter_screenutil: ^5.9.3
  diacritic: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  # Flutter không bundle assets đệ quy → phải liệt kê từng thư mục con.
  assets:
    - assets/data/
    - assets/data/shikigami/
    - assets/images/shikigami/ssr/
    - assets/images/shikigami/sr/
    - assets/images/shikigami/sp/
    - assets/images/shikigami/r/
    - assets/images/shikigami/n/
    - assets/images/souls/
    - assets/images/effects/
    - assets/images/rarity/
    - assets/images/skills/

  fonts:
    - family: BeVietnamPro
      fonts:
        - asset: assets/fonts/BeVietnamPro-Regular.ttf
        - asset: assets/fonts/BeVietnamPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BeVietnamPro-Bold.ttf
          weight: 700
